<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Course</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <h1>Add New Course</h1>

    <form th:action="@{/courses/add}" th:object="${course}" method="post">

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" th:field="*{name}" placeholder="e.g. Introduction to Java" />
            <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>

        <div class="form-group">
            <label for="category">Category</label>
            <select id="category" th:field="*{category}">
                <option value="Programming">Programming</option>
                <option value="Database">Database</option>
                <option value="Networking">Networking</option>
                <option value="Design">Design</option>
                <option value="Business">Business</option>
            </select>
            <span class="error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
        </div>

        <div class="form-group">
            <label for="price">Price</label>
            <input type="number" step="0.01" id="price" th:field="*{price}" />
            <span class="error" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
        </div>

        <div class="form-group">
            <label for="durationHours">Duration (hours)</label>
            <input type="number" id="durationHours" th:field="*{durationHours}" />
            <span class="error" th:if="${#fields.hasErrors('durationHours')}" th:errors="*{durationHours}"></span>
        </div>

        <div class="form-group">
            <label>Level</label>
            <label class="radio-label">
                <input type="radio" th:field="*{level}" value="BEGINNER" /> Beginner
            </label>
            <label class="radio-label">
                <input type="radio" th:field="*{level}" value="INTERMEDIATE" /> Intermediate
            </label>
            <label class="radio-label">
                <input type="radio" th:field="*{level}" value="ADVANCED" /> Advanced
            </label>
            <span class="error" th:if="${#fields.hasErrors('level')}" th:errors="*{level}"></span>
        </div>

        <div class="form-group">
            <label class="checkbox-label">
                <input type="checkbox" th:field="*{active}" /> Active
            </label>
        </div>

        <div class="form-group">
            <label for="code">Code</label>
            <input type="text" id="code" th:field="*{code}" placeholder="e.g. CSE-101" />
            <span class="error" th:if="${#fields.hasErrors('code')}" th:errors="*{code}"></span>
        </div>

        <button type="submit" class="btn">Save Course</button>
        <a class="btn btn-secondary" th:href="@{/courses}">Cancel</a>
    </form>
</div>

</body>
</html>
