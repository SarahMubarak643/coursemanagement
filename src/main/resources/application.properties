# ===== Application =====
spring.application.name=coursemanagement
server.port=8081

# ===== Custom property (injected with @Value) =====
training.system.name=COOP Training System

# ===== MySQL Database =====
spring.datasource.url=jdbc:mysql://localhost:3306/coursemanagement_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=soso123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===== SQL init (creates the Spring Security "users"/"authorities" tables
#       and seeds demo users, AFTER Hibernate has created the JPA tables) =====
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ===== Actuator =====
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=Course Management System
info.app.description=COOP Training Spring Boot Assignment

# ===== Swagger / springdoc =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
